<header class="header">
    <nav>
        @for (item of menuItems; track item.label) {
            <a (click)="navigate(item.path)">
              {{ item.label }}
            </a>
        }
        @if (authService.getConnectedName()) {
            <span>
                Bonjour, {{ authService.getConnectedName() }}
                <button (click)="logout()">Déconnexion</button>
            </span>
        }
        <button (click)="onClick()">Swagger</button>
    </nav>
</header>
